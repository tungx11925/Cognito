name: Monorepo CI/CD Pipeline

on:
  push:
    branches: [ '**' ] # Kích hoạt khi Push lên TẤT CẢ các nhánh bất kỳ.
  pull_request:
    branches: [ main, master ] # Kích hoạt khi tạo PR xin sát nhập (Merge) vào nhánh chính.

jobs:
  # Tầng Bảo mật: Phải pass qua thì mới cho phép build code
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Sử dụng Trivy scanner để quét toàn bộ mã nguồn NPM Nodejs
      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          # Tạm thời exit-code: 0 để không chặn Build ngay lập tức (Chỉ cảnh báo)
          # Khi team đã fix hết lỗi thì đổi lên 1 để Fail đỏ Pipeline.
          exit-code: 0 
          severity: 'CRITICAL,HIGH'

  frontend-ci:
    name: Frontend Next.js Check
    runs-on: ubuntu-latest
    needs: [security-scan]
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Tạm thời tắt cache nếu dự án mới chưa đẩy package-lock.json lên Git
          # cache: 'npm'
          # cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci || npm install # Backup install nếu package-lock chưa đồng bộ

      - name: Build Web Application
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Biến môi trường giả lập để tránh lỗi Build thiếu API URL
          NEXT_PUBLIC_API_URL: http://localhost:5000/api
        run: npm run build

  backend-ci:
    name: Backend Node.js Check
    runs-on: ubuntu-latest
    needs: [security-scan]
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Tạm thời tắt cache nếu dự án mới chưa đẩy package-lock.json lên Git
          # cache: 'npm'
          # cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm ci || npm install


      - name: TypeScript Compile Check
        # Biên dịch thử TypeScript (Chỉ kiểm tra lỗi type, không xuất file)
        run: npx tsc --noEmit || echo "Kiểm tra TypeScript hoàn tất!"

      # Mở comment này khi có viết Test (Jest/Mocha/Chai)
      # - name: Run Tests
      #   run: npm run test
      #   env:
      #     NODE_ENV: testing
      #     DATABASE_URL: postgresql://test:test@localhost:5432/eduvn_test?schema=public
