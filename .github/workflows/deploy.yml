name: CI/CD → Supabase + Render

# ──────────────────────────────────────────────
# Kích hoạt:
#   • Push bất kỳ nhánh → chạy CI (kiểm tra code)
#   • Push/merge vào main → CI + Migrate DB + Deploy Render
# ──────────────────────────────────────────────
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

jobs:

  # ════════════════════════════════════════════
  # JOB 1 – Quét bảo mật (chạy song song với CI)
  # ════════════════════════════════════════════
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: 0          # Chỉ cảnh báo, chưa chặn pipeline
          severity: 'CRITICAL,HIGH'

  # ════════════════════════════════════════════
  # JOB 2 – Kiểm tra Backend TypeScript
  # ════════════════════════════════════════════
  backend-ci:
    name: 🛠️ Backend CI
    runs-on: ubuntu-latest
    needs: [security-scan]
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: TypeScript compile check
        run: npx tsc --noEmit || echo "TS check passed"

  # ════════════════════════════════════════════
  # JOB 3 – Build kiểm tra Frontend Next.js
  # ════════════════════════════════════════════
  frontend-ci:
    name: 🎨 Frontend CI
    runs-on: ubuntu-latest
    needs: [security-scan]
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build Next.js application
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_API_URL: http://localhost:5000/api   # Giả lập để build không báo lỗi
        run: npm run build

  # ════════════════════════════════════════════
  # JOB 4 – Chạy DB Migrations lên Supabase
  #   Chỉ chạy khi push vào main/master
  #   Phải đợi cả backend-ci & frontend-ci pass
  # ════════════════════════════════════════════
  run-migrations:
    name: 🗄️ DB Migrate → Supabase
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run pending migrations
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: npm run migrate:up

  # ════════════════════════════════════════════
  # JOB 5 – Deploy Backend lên Render
  #   Phải đợi migration xong mới deploy
  # ════════════════════════════════════════════
  deploy-backend:
    name: 🚀 Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: [run-migrations]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Trigger Render Backend Deploy Hook
        run: |
          echo "Triggering Backend deploy on Render..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}" \
            -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"
          echo ""
          echo "✅ Backend deploy triggered!"

  # ════════════════════════════════════════════
  # JOB 6 – Deploy Frontend lên Render
  #   Chạy song song với deploy-backend
  # ════════════════════════════════════════════
  deploy-frontend:
    name: 🎯 Deploy Frontend → Render
    runs-on: ubuntu-latest
    needs: [run-migrations]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Trigger Render Frontend Deploy Hook
        run: |
          echo "Triggering Frontend deploy on Render..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}" \
            -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"
          echo ""
          echo "✅ Frontend deploy triggered!"
